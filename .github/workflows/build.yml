name: 自动编译洗白脚本 App (iOS 巨魔专属)

on:
  push:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest # 调用 GitHub 免费提供的 Mac 云服务器

    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v4

      - name: 🛠️ 部署云端 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: 🏗️ 自动生成 iOS 底层框架
        run: flutter create --project-name video_cleaner .

      - name: 🍏 强行拉升 iOS 最低支持版本 (突破 FFmpegKit 限制)
        run: sed -i '' "s/^# platform :ios.*/platform :ios, '13.0'/g" ios/Podfile

      - name: 📦 下载所有依赖武器
        run: flutter pub get

      - name: 🚀 开始编译 iOS 无签名版 (跳过证书限制)
        run: flutter build ios --release --no-codesign

      - name: 🧰 封装为 TrollStore 专用 IPA 格式
        run: |
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -qr 洗白脚本-TrollStore.ipa Payload

      - name: 🎁 输出巨魔安装包下载链接！
        uses: actions/upload-artifact@v4
        with:
          name: 洗白脚本-iOS-巨魔安装包
          path: build/ios/iphoneos/洗白脚本-TrollStore.ipa
