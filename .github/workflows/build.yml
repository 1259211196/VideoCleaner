name: 自动编译洗白脚本 App

on:
  push:
    branches: [ main ] # 当主分支有代码变动时，自动触发打包

jobs:
  build-android:
    runs-on: ubuntu-latest # 使用 GitHub 免费的 Linux 云服务器

    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v3

      - name: 🛠️ 部署云端 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # 稳定版本
          channel: 'stable'

      - name: 📦 下载所有依赖武器 (FFmpegKit 等)
        run: flutter pub get

      - name: 🚀 开始疯狂编译 APK
        run: flutter build apk --release

      - name: 🎁 打包完成，输出下载链接！
        uses: actions/upload-artifact@v3
        with:
          name: 洗白脚本-Android-安装包
          path: build/app/outputs/flutter-apk/app-release.apk
